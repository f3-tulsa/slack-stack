AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: slackblast-build-template

Parameters:
  SlackToken:
    Description: Slack token that is passed by the bot
    Type: String
    Default: "123"
    NoEcho: true
  SlackSigningSecret:
    Description: Auth token used to pass to the controller to get the commands
    Type: String
    Default: "123"
    NoEcho: true
  SlackClientSecret:
    Description: Auth token used to pass to the controller to get the commands
    Type: String
    Default: "123"
    NoEcho: true
  SlackOauthScopes:
    Description: OAuth scopes for Slack app install
    Type: String
    Default: "chat:write,chat:write.customize,chat:write.public,im:write,commands,team:read,users:read,users:read.email,channels:read,files:read,files:write"
  Stage:
    Description: Parameter for getting the deployment stage
    Type: String
    Default: test
  DatabaseHost:
    Description: RDS Database Host
    Type: String
    Default: "123"
  DatabaseUser:
    Description: RDS Database User
    Type: String
    Default: ""
  DatabasePassword:
    Description: RDS Database Password
    Type: String
    Default: "123"
    NoEcho: true
  DatabaseSchema:
    Description: RDS Database Schema
    Type: String
    Default: "slackblast"
  DatabasePort:
    Description: MySQL / TiDB port (3306 MySQL, 4000 TiDB)
    Type: String
    Default: "3306"
  DatabaseTlsEnabled:
    Description: Enable TLS for DB connections (true for TiDB Cloud)
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  PaxminerSchema:
    Description: PAXminer registry database (schema) name
    Type: String
    Default: "paxminer"
  PmAchievementsUrl:
    Description: PAXMiner achievements Function URL for post-backblast webhook (optional)
    Type: String
    Default: ""
  PmAchievementsWebhookSecret:
    Description: Shared secret header for PAXMiner achievements webhook (optional)
    Type: String
    Default: ""
    NoEcho: true
  DbEncryptionKey:
    Description: Required passphrase for DB field encryption (tokens, email password, Strava); maps to DB_ENCRYPTION_KEY. Min 16 chars.
    Type: String
    NoEcho: true
    MinLength: 16
  StravaClientID:
    Description: Strava Client ID
    Type: String
    Default: "123"
    NoEcho: true
  StravaClientSecret:
    Description: Strava Client Secret
    Type: String
    Default: "123"
    NoEcho: true
  Timezone:
    Description: IANA timezone for display (e.g. US/Central)
    Type: String
    Default: "US/Central"
  ImageBucketName:
    Description: Globally unique S3 bucket name for backblast / Strava static images (must be available)
    Type: String
  SlackClientId:
    Description: Slack app OAuth Client ID (Basic Information in api.slack.com); must match your self-hosted app
    Type: String
  CreateOauthTables:
    Description: Set to "true" on first deploy to create OAuth tables; leave "false" for normal deploys
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  EnableXRay:
    Description: Enable AWS X-Ray on Lambda (extra cost beyond free tier); set ENABLE_XRAY=true in deploy env to turn on
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  XRayEnabled: !Equals [!Ref EnableXRay, "true"]

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Tracing: !If [XRayEnabled, Active, PassThrough]

Mappings:
  StagesMap:
    test:
      KeepWarmName: "SlackblastKeepWarmTest"
    prod:
      KeepWarmName: "SlackblastKeepWarmProd"

Resources:
  SlackblastImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ImageBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  SlackblastImageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SlackblastImageBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${SlackblastImageBucket.Arn}/*"

  SlackblastFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionUrlConfig:
        AuthType: NONE
      CodeUri: slackblast/
      Handler: app.handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Policies:
        - Statement:
            - Sid: ImageBucketAccess
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:ListBucket
              Resource:
                - !Sub "${SlackblastImageBucket.Arn}/*"
                - !GetAtt SlackblastImageBucket.Arn
            - Sid: SelfInvoke
              Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-*"
      Timeout: 400
      MemorySize: 512
      Events:
        SlackblastKeepWarm:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "rate(5 minutes)"
            Name: !FindInMap
              - StagesMap
              - Ref: Stage
              - KeepWarmName
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackToken
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          ENV_SLACK_CLIENT_SECRET: !Ref SlackClientSecret
          ENV_SLACK_SCOPES: !Ref SlackOauthScopes
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          ADMIN_DATABASE_USER: !Ref DatabaseUser
          ADMIN_DATABASE_PASSWORD: !Ref DatabasePassword
          ADMIN_DATABASE_SCHEMA: !Ref DatabaseSchema
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          PM_ACHIEVEMENTS_URL: !Ref PmAchievementsUrl
          PM_ACHIEVEMENTS_WEBHOOK_SECRET: !Ref PmAchievementsWebhookSecret
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          TIMEZONE: !Ref Timezone
          IMAGE_S3_BUCKET: !Ref ImageBucketName
          ENV_SLACK_CLIENT_ID: !Ref SlackClientId
          STRAVA_CLIENT_ID: !Ref StravaClientID
          STRAVA_CLIENT_SECRET: !Ref StravaClientSecret
          CREATE_OAUTH_TABLES: !Ref CreateOauthTables

  SlackblastLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${SlackblastFunction}"
      RetentionInDays: 30

Outputs:
  SlackblastApi:
    Description: Lambda Function URL for Slackblast (append /slack/events, /slack/install, /slack/oauth_redirect, /exchange_token)
    Value: !GetAtt SlackblastFunctionUrl.FunctionUrl
  SlackblastFunction:
    Description: Slackblast Lambda Function ARN
    Value: !GetAtt SlackblastFunction.Arn
  SlackblastFunctionIamRole:
    Description: Implicit IAM Role created for Slackblast function
    Value: !GetAtt SlackblastFunctionRole.Arn
  SlackblastImageBucketName:
    Description: S3 bucket for backblast images and static assets
    Value: !Ref SlackblastImageBucket
  SlackblastImageBucketUrl:
    Description: Public base URL for image bucket
    Value: !Sub "https://${SlackblastImageBucket}.s3.amazonaws.com"
