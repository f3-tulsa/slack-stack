AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: qsignups-build-template

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Parameters:
  SlackToken:
    Description: Slack token that is passed by the bot
    Type: String
    Default: "123"
    NoEcho: true
  SlackSigningSecret:
    Description: Auth token used to pass to the controller to get the commands
    Type: String
    Default: "123"
    NoEcho: true
  SlackClientSecret:
    Description: Auth token used to pass to the controller to get the commands
    Type: String
    Default: "123"
    NoEcho: true
  SlackOauthScopes:
    Description: Auth token used to pass to the controller to get the commands
    Type: String
    Default: "app_mentions:read,channels:history,channels:join,channels:read,chat:write,chat:write.customize,chat:write.public,commands,files:read,files:write,im:history,im:read,im:write,reactions:read,reactions:write,team:read,users:read,users:read.email"
  Stage:
    Description: Parameter for getting the deployment stage
    Type: String
    Default: test
  DatabaseHost:
    Description: RDS Database Host
    Type: String
    Default: "123"
  DatabaseUser:
    Description: RDS Database User
    Type: String
    Default: ""
  DatabasePassword:
    Description: RDS Database Password
    Type: String
    Default: "123"
    NoEcho: true
  DatabaseSchema:
    Description: RDS / TiDB database (schema) name
    Type: String
    Default: "qsignups"
  DatabasePort:
    Description: MySQL / TiDB port (3306 MySQL, 4000 TiDB)
    Type: String
    Default: "3306"
  DatabaseTlsEnabled:
    Description: Enable TLS for DB connections (true for TiDB Cloud)
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  DbEncryptionKey:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: Required passphrase for DB field encryption (bot_token, google_auth_data). Min 16 chars.
  GoogleClientId:
    Type: String
    Default: ""
    NoEcho: true
    Description: Google OAuth client ID for Calendar
  GoogleClientSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Google OAuth client secret
  Timezone:
    Type: String
    Default: "US/Central"
  WeeklyAutomationTimezone:
    Type: String
    Default: "America/Chicago"
    Description: IANA timezone for the weekly Sunday reminder schedule
  ScheduleCreateLengthDays:
    Type: String
    Default: "365"
  GcalLookaheadDays:
    Type: String
    Default: "30"
  GcalReminderMinutes:
    Type: String
    Default: "1440"
  EventPickerWeeks:
    Type: String
    Default: "12"
  UpcomingDays:
    Type: String
    Default: "7"
  DefaultEventStart:
    Type: String
    Default: "05:30"
  DefaultEventEnd:
    Type: String
    Default: "06:15"
  DefaultEventDurationMinutes:
    Type: String
    Default: "45"
  SlackClientId:
    Description: Slack app OAuth Client ID (Basic Information in api.slack.com); must match your self-hosted app
    Type: String
  ImageBucketName:
    Description: S3 bucket for weinke PNGs (same public bucket as slackblast images; objects under weinkes/)
    Type: String
  CreateOauthTables:
    Description: Set to "true" on first deploy to create OAuth tables; leave "false" for normal deploys
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  ExtendScheduleDeployNonce:
    Type: String
    Default: "no-extend"
    Description: >
      Use a changing value (e.g. git SHA, unix time) only when you want the deploy-time
      extend-schedule custom resource to run. Default "no-extend" skips re-invocation on
      routine deploys; set RUN_EXTEND_SCHEDULE=true in deploy env to pass a new nonce.
  EnableXRay:
    Description: Enable AWS X-Ray on Lambda (extra cost beyond free tier); set ENABLE_XRAY=true in deploy env to turn on
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  PmRegionalSchema:
    Description: >
      PAXminer regional DB schema containing aos.site_q_user_id (e.g. f3ttown_prod).
      Same value as PM_REGIONAL_SCHEMA (first schema if comma-separated). Leave empty to skip Site Q sync.
    Type: String
    Default: ""
  # PasswordEncryptKey:
  #   Description: Hash encrypt key for decrypting email passwords
  #   Type: String
  #   Default: "123"
  # StravaClientID:
  #   Description: Strava Client ID
  #   Type: String
  #   Default: "123"
  # StravaClientSecret:
  #   Description: Strava Client Secret
  #   Type: String
  #   Default: "123"

Conditions:
  XRayEnabled: !Equals [!Ref EnableXRay, "true"]

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Tracing: !If [XRayEnabled, Active, PassThrough]

Mappings:
  StagesMap:
    test:
      KeepWarmName: "QSignupsKeepWarmTest"
      ExtendScheduleName: "QSignupsExtendScheduleTest"
    prod:
      KeepWarmName: "QSignupsKeepWarmProd"
      ExtendScheduleName: "QSignupsExtendScheduleProd"

Resources:
  QSignupsFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      FunctionUrlConfig:
        AuthType: NONE
      CodeUri: qsignups/
      Handler: app.handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Policies:
        - Statement:
            - Sid: SelfInvoke
              Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-*"
            - Sid: WeinkeImageUpload
              Effect: Allow
              Action: s3:PutObject
              Resource: !Sub "arn:aws:s3:::${ImageBucketName}/weinkes/*"
      Timeout: 400
      MemorySize: 512
      Events:
        QSignupsKeepWarm:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "rate(5 minutes)"
            Name: !FindInMap
              - StagesMap
              - Ref: Stage
              - KeepWarmName
        QSignupsExtendSchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 3 ? * SUN *)"
            ScheduleExpressionTimezone: !Ref WeeklyAutomationTimezone
            Name: !FindInMap
              - StagesMap
              - Ref: Stage
              - ExtendScheduleName
            Input: '{"source": "qsignups.weekly-automation"}'
        # StravaExchange:
        #   Type: Api
        #   Properties:
        #     Path: /exchange_token
        #     Method: get
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackToken
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          ENV_SLACK_CLIENT_SECRET: !Ref SlackClientSecret
          ENV_SLACK_SCOPES: !Ref SlackOauthScopes
          DATABASE_HOST: !Ref DatabaseHost
          ADMIN_DATABASE_USER: !Ref DatabaseUser
          ADMIN_DATABASE_PASSWORD: !Ref DatabasePassword
          ADMIN_DATABASE_SCHEMA: !Ref DatabaseSchema
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          TIMEZONE: !Ref Timezone
          SCHEDULE_CREATE_LENGTH_DAYS: !Ref ScheduleCreateLengthDays
          GCAL_LOOKAHEAD_DAYS: !Ref GcalLookaheadDays
          GCAL_REMINDER_MINUTES: !Ref GcalReminderMinutes
          EVENT_PICKER_WEEKS: !Ref EventPickerWeeks
          UPCOMING_DAYS: !Ref UpcomingDays
          DEFAULT_EVENT_START: !Ref DefaultEventStart
          DEFAULT_EVENT_END: !Ref DefaultEventEnd
          DEFAULT_EVENT_DURATION_MINUTES: !Ref DefaultEventDurationMinutes
          ENV_SLACK_CLIENT_ID: !Ref SlackClientId
          CREATE_OAUTH_TABLES: !Ref CreateOauthTables
          IMAGE_S3_BUCKET: !Ref ImageBucketName
          PM_REGIONAL_SCHEMA: !Ref PmRegionalSchema
          # STRAVA_CLIENT_ID: !Ref StravaClientID
          # STRAVA_CLIENT_SECRET: !Ref StravaClientSecret

  QSignupsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${QSignupsFunction}"
      RetentionInDays: 30

  # Invokes QSignups with extend-schedule after each stack deploy (Custom Resource below).
  QSignupsExtendScheduleInvoker:
    Type: AWS::Serverless::Function
    Properties:
      Description: CloudFormation custom resource provider; invokes main Lambda with extend-schedule payload
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      MemorySize: 128
      InlineCode: |
        import json
        import os
        import urllib.request

        import boto3

        PHYSICAL_ID = "QSignupsExtendScheduleOnDeploy"

        def send_resp(event, context, status, physical_id, reason, data=None):
            body = json.dumps({
                "Status": status,
                "Reason": (reason or "")[:4096],
                "PhysicalResourceId": physical_id,
                "StackId": event["StackId"],
                "RequestId": event["RequestId"],
                "LogicalResourceId": event["LogicalResourceId"],
                "Data": data or {},
            }).encode("utf-8")
            req = urllib.request.Request(
                event["ResponseURL"],
                data=body,
                method="PUT",
                headers={"Content-Type": ""},
            )
            urllib.request.urlopen(req)

        def handler(event, context):
            physical_id = event.get("PhysicalResourceId") or PHYSICAL_ID
            if event.get("RequestType") == "Delete":
                send_resp(event, context, "SUCCESS", physical_id, "No-op on delete")
                return
            try:
                boto3.client("lambda").invoke(
                    FunctionName=os.environ["QSIGNUPS_FUNCTION_NAME"],
                    InvocationType="RequestResponse",
                    Payload=json.dumps({"source": "qsignups.extend-schedule"}).encode("utf-8"),
                )
                send_resp(event, context, "SUCCESS", physical_id, "Invoked extend-schedule")
            except Exception as e:
                send_resp(event, context, "FAILED", physical_id, str(e))
                raise
      Environment:
        Variables:
          QSIGNUPS_FUNCTION_NAME: !Ref QSignupsFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref QSignupsFunction

  QSignupsExtendScheduleOnDeploy:
    Type: Custom::ExtendScheduleOnDeploy
    Properties:
      ServiceToken: !GetAtt QSignupsExtendScheduleInvoker.Arn
      DeployNonce: !Ref ExtendScheduleDeployNonce

Outputs:
  QSignupsApi:
    Description: Lambda Function URL for QSignups (append /slack/events, /slack/install, /slack/oauth_redirect for Slack)
    Value: !GetAtt QSignupsFunctionUrl.FunctionUrl
  QSignupsFunction:
    Description: QSignups Lambda Function ARN
    Value: !GetAtt QSignupsFunction.Arn
  QSignupsFunctionIamRole:
    Description: IAM role for the QSignups Lambda function
    Value: !GetAtt QSignupsFunctionRole.Arn
  # S3Bucket:
  #   Description: Bucket Created using this template.
  #   Value: !Ref S3Bucket
