AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Weaselbot — PAX achievements (daily) and Kotter reports (weekly), container-image Lambda.

Globals:
  Function:
    Architectures:
      - x86_64

Parameters:
  DatabaseHost:
    Type: String
  DatabasePort:
    Type: String
    Default: "4000"
  DatabaseUser:
    Type: String
  DatabasePassword:
    Type: String
    NoEcho: true
  DatabaseTlsEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  PaxminerSchema:
    Type: String
    Default: paxminer
  WeaselbotSchema:
    Type: String
    Default: weaselbot
  DbEncryptionKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional passphrase for DB field encryption; maps to DB_ENCRYPTION_KEY
  AchievementsSchedule:
    Type: String
    Default: rate(1 day)
  KotterSchedule:
    Type: String
    Default: cron(0 12 ? * MON *)
  HomeRegionDateTiers:
    Type: String
    Default: "30,60,90,120"
    Description: Comma-separated day tiers for home-region logic

Resources:
  AchievementsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-weaselbot-achievements"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.achievements_handler
      MemorySize: 512
      Timeout: 300
      Events:
        DailyRun:
          Type: Schedule
          Properties:
            Schedule: !Ref AchievementsSchedule
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          WEASELBOT_SCHEMA: !Ref WeaselbotSchema
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          HOME_REGION_DATE_TIERS: !Ref HomeRegionDateTiers
    Metadata:
      DockerTag: weaselbot-achievements
      DockerContext: ..
      Dockerfile: weaselbot/Dockerfile

  KotterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-weaselbot-kotter"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.kotter_handler
      MemorySize: 512
      Timeout: 900
      Events:
        WeeklyRun:
          Type: Schedule
          Properties:
            Schedule: !Ref KotterSchedule
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          WEASELBOT_SCHEMA: !Ref WeaselbotSchema
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          HOME_REGION_DATE_TIERS: !Ref HomeRegionDateTiers
    Metadata:
      DockerTag: weaselbot-kotter
      DockerContext: ..
      Dockerfile: weaselbot/Dockerfile

Outputs:
  AchievementsFunctionArn:
    Value: !GetAtt AchievementsFunction.Arn
  KotterFunctionArn:
    Value: !GetAtt KotterFunction.Arn
