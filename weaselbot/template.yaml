AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Weaselbot — PAX achievements (daily) and Kotter reports (weekly), container-image Lambda.

Globals:
  Function:
    Architectures:
      - x86_64

Parameters:
  DatabaseHost:
    Type: String
  DatabasePort:
    Type: String
    Default: "4000"
  DatabaseUser:
    Type: String
  DatabasePassword:
    Type: String
    NoEcho: true
  DatabaseTlsEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  PaxminerSchema:
    Type: String
    Default: paxminer
  WeaselbotSchema:
    Type: String
    Default: weaselbot
  DbEncryptionKey:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: Required passphrase for DB field encryption; maps to DB_ENCRYPTION_KEY. Min 16 chars.
  AchievementsSchedule:
    Type: String
    Default: rate(1 day)
  KotterSchedule:
    Type: String
    Default: cron(0 12 ? * MON *)
  HomeRegionDateTiers:
    Type: String
    Default: "30,60,90,120"
    Description: Comma-separated day tiers for home-region logic
  Stage:
    Type: String
    AllowedValues:
      - test
      - prod
    Description: Deploy stage (suffix for regional schema names)
  F3RegionName:
    Type: String
    Description: F3 region key used to build paxminer regional schema name (e.g. f3ttown -> f3ttown_test)
  WbSlackToken:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: Weaselbot Slack bot token (encrypted into DB at cold start)
  F3RegionSlackTeamId:
    Type: String
    Description: Slack workspace Team ID (e.g. T01234567); available to Lambdas as F3_REGION_SLACK_TEAM_ID (e.g. weaselbot.regions.team_id)
  WeaselbotPaxminerRegionalSchemas:
    Type: String
    Default: ""
    Description: Optional comma-separated PAXminer regional schema names for achievements only (e.g. f3ttown_prod). Empty = all f3% from paxminer.regions.

Resources:
  AchievementsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-weaselbot-achievements"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.achievements_handler
      MemorySize: 512
      Timeout: 300
      Events:
        DailyRun:
          Type: Schedule
          Properties:
            Schedule: !Ref AchievementsSchedule
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          WEASELBOT_SCHEMA: !Ref WeaselbotSchema
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          HOME_REGION_DATE_TIERS: !Ref HomeRegionDateTiers
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          WB_SLACK_TOKEN: !Ref WbSlackToken
          F3_REGION_SLACK_TEAM_ID: !Ref F3RegionSlackTeamId
          WEASELBOT_PAXMINER_REGIONAL_SCHEMAS: !Ref WeaselbotPaxminerRegionalSchemas
    Metadata:
      DockerTag: weaselbot-achievements
      DockerContext: ..
      Dockerfile: weaselbot/Dockerfile

  AchievementsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-weaselbot-achievements"
      RetentionInDays: 30

  KotterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-weaselbot-kotter"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.kotter_handler
      MemorySize: 512
      Timeout: 900
      Events:
        WeeklyRun:
          Type: Schedule
          Properties:
            Schedule: !Ref KotterSchedule
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          WEASELBOT_SCHEMA: !Ref WeaselbotSchema
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          HOME_REGION_DATE_TIERS: !Ref HomeRegionDateTiers
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          WB_SLACK_TOKEN: !Ref WbSlackToken
          F3_REGION_SLACK_TEAM_ID: !Ref F3RegionSlackTeamId
    Metadata:
      DockerTag: weaselbot-kotter
      DockerContext: ..
      Dockerfile: weaselbot/Dockerfile

  KotterLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-weaselbot-kotter"
      RetentionInDays: 30

Outputs:
  AchievementsFunctionArn:
    Value: !GetAtt AchievementsFunction.Arn
  KotterFunctionArn:
    Value: !GetAtt KotterFunction.Arn
