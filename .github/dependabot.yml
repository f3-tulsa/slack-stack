version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "13:00"
      timezone: America/Chicago
    groups:
      minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
