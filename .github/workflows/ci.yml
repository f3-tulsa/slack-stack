# PR and branch checks without cloud credentials. Deploy stays in deploy.yml.
name: CI

on:
  pull_request:
  push:
    branches: [main, test, prod]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sam-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: sam validate --lint
        run: |
          set -euo pipefail
          sam validate -t PAXminer/template.yaml --lint
          sam validate -t weaselbot/template.yaml --lint
          sam validate -t slackblast/template.yaml --lint
          sam validate -t qsignups/template.yaml --lint
          sam validate -t infra/template.bootstrap.yaml --lint

  test:
    runs-on: ubuntu-latest
    env:
      # qsignups app import validates DB_ENCRYPTION_KEY at module load (handler routing test)
      DB_ENCRYPTION_KEY: ci-test-encryption-key-32chars!
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      # Separate venvs per app — combined requirements can conflict (e.g. pymysql pins).
      - name: pytest weaselbot
        run: |
          set -euo pipefail
          python -m venv .venv-weaselbot
          . .venv-weaselbot/bin/activate
          pip install pytest -r weaselbot/requirements-lambda.txt
          cd weaselbot && pytest -q tests/
      - name: pytest slackblast
        run: |
          set -euo pipefail
          python -m venv .venv-slackblast
          . .venv-slackblast/bin/activate
          pip install pytest -r slackblast/slackblast/requirements.txt
          pytest -q slackblast/test/
      - name: pytest qsignups
        run: |
          set -euo pipefail
          python -m venv .venv-qsignups
          . .venv-qsignups/bin/activate
          # boto3 is on Lambda runtime but needed for slack_bolt.aws_lambda imports in tests
          pip install pytest boto3 -r qsignups/qsignups/requirements.txt
          pytest -q qsignups/testing/

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Security audit Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pip-audit
          pip-audit -r PAXminer/requirements-lambda.txt
          pip-audit -r weaselbot/requirements-lambda.txt
          pip-audit -r slackblast/slackblast/requirements.txt
          pip-audit -r qsignups/qsignups/requirements.txt
