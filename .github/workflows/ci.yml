# PR and branch checks without cloud credentials. Deploy stays in deploy.yml.
name: CI

on:
  pull_request:
  push:
    branches: [main, test, prod]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # App token (not GITHUB_TOKEN) for the push: commits made with GITHUB_TOKEN do not
  # re-trigger workflows, which leaves Dependabot auto-merge waiting on checks that
  # never run against the new HEAD.
  requirements-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry and export plugin
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry self add poetry-plugin-export

      - name: Sync slackblast requirements.txt with poetry.lock
        env:
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          (
            cd slackblast/slackblast
            poetry export -f requirements.txt --without-hashes -o requirements.txt
          )
          if git diff --quiet slackblast/slackblast/requirements.txt; then
            echo "Lockfile exports are already in sync."
            exit 0
          fi
          if [[ -n "${PR_HEAD_REPO}" && "${PR_HEAD_REPO}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "::error::slackblast/slackblast/requirements.txt is out of sync with poetry.lock. Run: cd slackblast/slackblast && poetry export -f requirements.txt --without-hashes -o requirements.txt"
            exit 1
          fi

          git add slackblast/slackblast/requirements.txt
          git commit -m "chore: sync requirements exports with lockfiles"
          git push
          echo "::notice::Requirements exports were out of sync and have been auto-fixed (app-token push retriggers CI)."

  # Keep the legacy check name so branch rulesets that still require
  # weaselbot-requirements-sync stay green without a ruleset edit.
  weaselbot-requirements-sync:
    runs-on: ubuntu-latest
    needs: [requirements-sync]
    steps:
      - run: echo "Weaselbot retired; covered by requirements-sync (slackblast only)."

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Install Poetry and export plugin
        run: |
          python -m pip install --upgrade pip poetry pre-commit
          poetry self add poetry-plugin-export
      - name: Run pre-commit
        run: pre-commit run --all-files

  sam-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate SAM templates
        run: |
          sam validate -t PAXminer/template.yaml --lint
          sam validate -t slackblast/template.yaml --lint
          sam validate -t qsignups/template.yaml --lint
          sam validate -t infra/template.bootstrap.yaml --lint

  test:
    runs-on: ubuntu-latest
    env:
      DB_ENCRYPTION_KEY: ci-test-encryption-key-32chars!
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: pytest PAXminer
        run: |
          set -euo pipefail
          python -m venv .venv-paxminer
          . .venv-paxminer/bin/activate
          # Heavy image deps + light Slack Bolt deps (boto3 is on Lambda runtime; needed locally for adapter import)
          pip install pytest boto3 -r PAXminer/requirements-lambda.txt -r PAXminer/requirements-slack.txt
          cd PAXminer && pytest -q tests/test_achievements.py tests/test_handlers.py tests/test_slack_app.py
      - name: pytest slackblast
        run: |
          set -euo pipefail
          python -m venv .venv-slackblast
          . .venv-slackblast/bin/activate
          pip install pytest boto3 -r slackblast/slackblast/requirements.txt
          pytest -q slackblast/test/
      - name: pytest qsignups
        run: |
          set -euo pipefail
          python -m venv .venv-qsignups
          . .venv-qsignups/bin/activate
          pip install pytest boto3 -r qsignups/qsignups/requirements.txt
          pytest -q qsignups/testing/

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Security audit Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pip-audit
          pip-audit -r PAXminer/requirements-lambda.txt
          pip-audit -r PAXminer/requirements-slack.txt
          pip-audit -r PAXminer/requirements.txt
          pip-audit -r PAXminer/database_management/requirements.txt
          pip-audit -r slackblast/slackblast/requirements.txt
          pip-audit -r qsignups/qsignups/requirements.txt
          pip-audit -r qsignups/weinkes/requirements.txt
          pip-audit -r migration/requirements.txt
