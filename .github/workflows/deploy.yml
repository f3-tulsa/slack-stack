name: Deploy Slack Stack

on:
  push:
    branches: [test, prod]
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment name (must match branch deploy targets)
        required: true
        type: choice
        options:
          - test
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Must match deploy.sh SAM artifact bucket resolution: only this bootstrap bucket is allowed
      # by SlackStackDeployPolicy (S3DeployBucket). Do not switch to --resolve-s3 here without
      # widening IAM — SAM's default aws-sam-cli-managed-default-samclisourcebucket-* is not covered.
      - name: Resolve deployment bucket
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name slack-stack-bootstrap \
            --region "${{ vars.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='DeploymentBucketName'].OutputValue | [0]" \
            --output text)
          if [[ -z "$BUCKET" || "$BUCKET" == "None" ]]; then
            echo "::error::Could not resolve DeploymentBucketName from slack-stack-bootstrap stack"
            exit 1
          fi
          echo "SAM_S3_BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "Using deployment bucket: $BUCKET"

      - name: Validate DB_ENCRYPTION_KEY
        env:
          KEY: ${{ secrets.DB_ENCRYPTION_KEY }}
        run: |
          if [[ -z "$KEY" ]]; then
            echo "::error::DB_ENCRYPTION_KEY secret is not set for this environment"
            exit 1
          fi
          if [[ "${#KEY}" -lt 16 ]]; then
            echo "::error::DB_ENCRYPTION_KEY must be at least 16 characters"
            exit 1
          fi

      - name: Validate Slack OAuth client IDs
        env:
          SB_ID: ${{ vars.SB_SLACK_CLIENT_ID }}
          QS_ID: ${{ vars.QS_SLACK_CLIENT_ID }}
        run: |
          if [[ -z "$SB_ID" ]]; then
            echo "::error::SB_SLACK_CLIENT_ID variable is not set for this environment"
            exit 1
          fi
          if [[ -z "$QS_ID" ]]; then
            echo "::error::QS_SLACK_CLIENT_ID variable is not set for this environment"
            exit 1
          fi

      # --- PAXminer (container image) ---
      - name: Build PAXminer
        run: sam build -t PAXminer/template.yaml --no-cached
      - name: Deploy PAXminer
        run: |
          sam deploy \
            --stack-name paxminer-${{ vars.STAGE }} \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --resolve-image-repos \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DatabaseHost=${{ secrets.DATABASE_HOST }} \
              DatabasePort=${{ secrets.DATABASE_PORT }} \
              DatabaseUser=${{ secrets.DATABASE_USER }} \
              DatabasePassword=${{ secrets.DATABASE_PASSWORD }} \
              DatabaseTlsEnabled=${{ vars.DATABASE_TLS_ENABLED }} \
              DbEncryptionKey=${{ secrets.DB_ENCRYPTION_KEY }} \
              PaxminerSchema=${{ vars.PAXMINER_SCHEMA }}_${{ vars.STAGE }} \
              Stage=${{ vars.STAGE }} \
              F3RegionName=${{ vars.F3_REGION_NAME }} \
              PmSlackToken=${{ secrets.PM_SLACK_TOKEN }}

      # --- Weaselbot (container image) ---
      - name: Build Weaselbot
        run: sam build -t weaselbot/template.yaml --no-cached
      - name: Deploy Weaselbot
        run: |
          sam deploy \
            --stack-name weaselbot-${{ vars.STAGE }} \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --resolve-image-repos \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DatabaseHost=${{ secrets.DATABASE_HOST }} \
              DatabasePort=${{ secrets.DATABASE_PORT }} \
              DatabaseUser=${{ secrets.DATABASE_USER }} \
              DatabasePassword=${{ secrets.DATABASE_PASSWORD }} \
              DatabaseTlsEnabled=${{ vars.DATABASE_TLS_ENABLED }} \
              DbEncryptionKey=${{ secrets.DB_ENCRYPTION_KEY }} \
              PaxminerSchema=${{ vars.PAXMINER_SCHEMA }}_${{ vars.STAGE }} \
              WeaselbotSchema=${{ vars.WEASELBOT_SCHEMA }}_${{ vars.STAGE }} \
              Stage=${{ vars.STAGE }} \
              F3RegionName=${{ vars.F3_REGION_NAME }} \
              WbSlackToken=${{ secrets.WB_SLACK_TOKEN }} \
              F3RegionSlackTeamId=${{ vars.F3_REGION_SLACK_TEAM_ID }}

      # --- slackblast ---
      - name: Build slackblast
        run: sam build -t slackblast/template.yaml --use-container --no-cached
      - name: Deploy slackblast
        env:
          SB_STRAVA_CLIENT_ID: ${{ secrets.SB_STRAVA_CLIENT_ID }}
          SB_STRAVA_CLIENT_SECRET: ${{ secrets.SB_STRAVA_CLIENT_SECRET }}
          SB_CREATE_OAUTH_TABLES: ${{ vars.SB_CREATE_OAUTH_TABLES }}
        run: |
          set -euo pipefail
          OVERRIDES=(
            "Stage=${{ vars.STAGE }}"
            "DatabaseHost=${{ secrets.DATABASE_HOST }}"
            "DatabasePort=${{ secrets.DATABASE_PORT }}"
            "DatabaseUser=${{ secrets.DATABASE_USER }}"
            "DatabasePassword=${{ secrets.DATABASE_PASSWORD }}"
            "DatabaseTlsEnabled=${{ vars.DATABASE_TLS_ENABLED }}"
            "DatabaseSchema=${{ vars.SLACKBLAST_SCHEMA }}_${{ vars.STAGE }}"
            "PaxminerSchema=${{ vars.PAXMINER_SCHEMA }}_${{ vars.STAGE }}"
            "SlackToken=${{ secrets.SB_SLACK_TOKEN }}"
            "SlackSigningSecret=${{ secrets.SB_SLACK_SIGNING_SECRET }}"
            "SlackClientSecret=${{ secrets.SB_SLACK_CLIENT_SECRET }}"
            "SlackClientId=${{ vars.SB_SLACK_CLIENT_ID }}"
            "DbEncryptionKey=${{ secrets.DB_ENCRYPTION_KEY }}"
            "ImageBucketName=${{ vars.IMAGE_S3_BUCKET }}"
          )
          [[ -n "${SB_STRAVA_CLIENT_ID:-}" ]] && OVERRIDES+=("StravaClientID=${SB_STRAVA_CLIENT_ID}")
          [[ -n "${SB_STRAVA_CLIENT_SECRET:-}" ]] && OVERRIDES+=("StravaClientSecret=${SB_STRAVA_CLIENT_SECRET}")
          [[ -n "${SB_CREATE_OAUTH_TABLES:-}" ]] && OVERRIDES+=("CreateOauthTables=${SB_CREATE_OAUTH_TABLES}")
          sam deploy \
            --stack-name slackblast-${{ vars.STAGE }} \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "${OVERRIDES[@]}"

      # --- qsignups ---
      - name: Build qsignups
        run: sam build -t qsignups/template.yaml --use-container --no-cached
      - name: Deploy qsignups
        env:
          QS_GOOGLE_CLIENT_ID: ${{ secrets.QS_GOOGLE_CLIENT_ID }}
          QS_GOOGLE_CLIENT_SECRET: ${{ secrets.QS_GOOGLE_CLIENT_SECRET }}
          QS_CREATE_OAUTH_TABLES: ${{ vars.QS_CREATE_OAUTH_TABLES }}
        run: |
          set -euo pipefail
          OVERRIDES=(
            "Stage=${{ vars.STAGE }}"
            "DatabaseHost=${{ secrets.DATABASE_HOST }}"
            "DatabasePort=${{ secrets.DATABASE_PORT }}"
            "DatabaseUser=${{ secrets.DATABASE_USER }}"
            "DatabasePassword=${{ secrets.DATABASE_PASSWORD }}"
            "DatabaseTlsEnabled=${{ vars.DATABASE_TLS_ENABLED }}"
            "DatabaseSchema=${{ vars.QSIGNUPS_SCHEMA }}_${{ vars.STAGE }}"
            "SlackToken=${{ secrets.QS_SLACK_TOKEN }}"
            "SlackSigningSecret=${{ secrets.QS_SLACK_SIGNING_SECRET }}"
            "SlackClientSecret=${{ secrets.QS_SLACK_CLIENT_SECRET }}"
            "SlackClientId=${{ vars.QS_SLACK_CLIENT_ID }}"
            "DbEncryptionKey=${{ secrets.DB_ENCRYPTION_KEY }}"
            "ExtendScheduleDeployNonce=${{ github.sha }}"
          )
          [[ -n "${QS_GOOGLE_CLIENT_ID:-}" ]] && OVERRIDES+=("GoogleClientId=${QS_GOOGLE_CLIENT_ID}")
          [[ -n "${QS_GOOGLE_CLIENT_SECRET:-}" ]] && OVERRIDES+=("GoogleClientSecret=${QS_GOOGLE_CLIENT_SECRET}")
          [[ -n "${QS_CREATE_OAUTH_TABLES:-}" ]] && OVERRIDES+=("CreateOauthTables=${QS_CREATE_OAUTH_TABLES}")
          sam deploy \
            --stack-name qsignups-${{ vars.STAGE }} \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "${OVERRIDES[@]}"

      # Force cold start so token bootstrap runs (DB upsert) without waiting for EventBridge schedule
      - name: Smoke-test scheduled Lambdas
        env:
          STAGE: ${{ vars.STAGE }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          invoke_one() {
            local fn="$1"
            echo "--- Invoking ${fn} ---"
            aws lambda invoke \
              --function-name "$fn" \
              --invocation-type RequestResponse \
              --cli-binary-format raw-in-base64-out \
              --payload '{}' \
              --log-type Tail \
              /tmp/lambda-payload.json > /tmp/lambda-meta.json
            if jq -e '.LogResult' /tmp/lambda-meta.json >/dev/null 2>&1; then
              echo "--- CloudWatch tail (last invocation) ---"
              jq -r '.LogResult' /tmp/lambda-meta.json | base64 -d 2>/dev/null || true
              echo ""
            fi
            echo "--- Handler response ---"
            cat /tmp/lambda-payload.json
            echo ""
            local sc
            sc=$(jq -r '.statusCode // empty' /tmp/lambda-payload.json 2>/dev/null || echo "")
            if [[ -z "$sc" || "$sc" == "null" ]]; then
              echo "::error::Lambda ${fn}: response missing statusCode"
              exit 1
            fi
            if [[ "$sc" != "200" ]]; then
              echo "::error::Lambda ${fn} returned statusCode=${sc}"
              exit 1
            fi
          }
          invoke_one "paxminer-${STAGE}-paxminer-sync"
          invoke_one "weaselbot-${STAGE}-weaselbot-achievements"

      - name: Deploy summary, receipt, and stage Slack manifests
        env:
          STAGE: ${{ vars.STAGE }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          mkdir -p receipts
          RECEIPT="receipts/deploy-ci-${STAGE}-$(date -u +%Y%m%d%H%M%S).txt"
          {
            echo "=== Deploy receipt (CI) ==="
            echo "Started (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Stage: ${STAGE}"
            echo "AWS region: ${AWS_DEFAULT_REGION}"
            echo ""
            echo "--- Stack outputs ---"
            for s in paxminer weaselbot slackblast qsignups; do
              name="${s}-${STAGE}"
              echo "# ${name}"
              aws cloudformation describe-stacks --stack-name "$name" \
                --query 'Stacks[0].Outputs[].[OutputKey,OutputValue]' --output text 2>/dev/null || echo "(describe-stacks failed for ${name})"
              echo ""
            done
          } | tee "$RECEIPT"

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            {
              echo "## Deploy outputs (${STAGE})"
              echo ""
              echo '```'
              cat "$RECEIPT"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          ROOT="${GITHUB_WORKSPACE}"
          cd "$ROOT"
          get_out() {
            aws cloudformation describe-stacks --stack-name "$1" --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue | [0]" --output text 2>/dev/null || true
          }
          api_base() {
            local url="$1"
            [[ -z "$url" || "$url" == "None" ]] && { echo ""; return; }
            url="${url%%/slack/events*}"
            while [[ "$url" == */ ]]; do url="${url%/}"; done
            echo "$url"
          }
          write_subst() {
            local app="$1" base="$2"
            python3 -c "import pathlib,sys; s=pathlib.Path(sys.argv[1]); d=pathlib.Path(sys.argv[2]); b=sys.argv[3]; d.write_text(s.read_text(encoding='utf-8').replace('__HOSTNAME__', b), encoding='utf-8')" \
              "$ROOT/$app/manifest.json" "$ROOT/$app/manifest-${STAGE}.json" "$base"
            echo "Wrote $app/manifest-${STAGE}.json"
          }
          SB_FULL="$(get_out "slackblast-${STAGE}" SlackblastApi)"
          SB_BASE="$(api_base "$SB_FULL")"
          if [[ -n "$SB_BASE" ]]; then
            write_subst slackblast "$SB_BASE"
          else
            echo "WARN: SlackblastApi missing; skip slackblast manifest"
          fi
          QS_FULL="$(get_out "qsignups-${STAGE}" QSignupsApi)"
          QS_BASE="$(api_base "$QS_FULL")"
          if [[ -n "$QS_BASE" ]]; then
            write_subst qsignups "$QS_BASE"
          else
            echo "WARN: QSignupsApi missing; skip qsignups manifest"
          fi
          for app in PAXminer weaselbot; do
            cp "$ROOT/$app/manifest.json" "$ROOT/$app/manifest-${STAGE}.json"
            echo "Wrote $app/manifest-${STAGE}.json (copy)"
          done
          echo "Receipt: ${RECEIPT}"

      - name: Upload deploy receipt and manifests
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: deploy-receipt-manifests-${{ vars.STAGE }}-${{ github.run_id }}
          path: |
            receipts/
            PAXminer/manifest-${{ vars.STAGE }}.json
            weaselbot/manifest-${{ vars.STAGE }}.json
            slackblast/manifest-${{ vars.STAGE }}.json
            qsignups/manifest-${{ vars.STAGE }}.json
          if-no-files-found: warn
