name: Deploy Slack Stack

on:
  push:
    branches: [test, prod]
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment name (must match branch deploy targets)
        required: true
        type: choice
        options:
          - test
          - prod
      stack:
        description: Deploy only this stack (push events ignore this and use path detection)
        required: false
        default: all
        type: choice
        options:
          - all
          - paxminer
          - slackblast
          - qsignups

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.ref_name }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run_paxminer: ${{ steps.pick.outputs.run_paxminer }}
      run_slackblast: ${{ steps.pick.outputs.run_slackblast }}
      run_qsignups: ${{ steps.pick.outputs.run_qsignups }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            paxminer:
              - 'PAXminer/**'
              - 'common/**'
            slackblast:
              - 'slackblast/**'
            qsignups:
              - 'qsignups/**'
            infra:
              - 'infra/**'

      - id: pick
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            STACK="${{ github.event.inputs.stack }}"
            [[ -z "$STACK" ]] && STACK="all"
            PM=false SB=false QS=false
            if [[ "$STACK" == "all" ]]; then
              PM=true SB=true QS=true
            else
              case "$STACK" in
                paxminer) PM=true ;;
                slackblast) SB=true ;;
                qsignups) QS=true ;;
              esac
            fi
            echo "run_paxminer=$PM" >> "$GITHUB_OUTPUT"
            echo "run_slackblast=$SB" >> "$GITHUB_OUTPUT"
            echo "run_qsignups=$QS" >> "$GITHUB_OUTPUT"
          else
            INFRA="${{ steps.filter.outputs.infra }}"
            if [[ "$INFRA" == "true" ]]; then
              echo "run_paxminer=true" >> "$GITHUB_OUTPUT"
              echo "run_slackblast=true" >> "$GITHUB_OUTPUT"
              echo "run_qsignups=true" >> "$GITHUB_OUTPUT"
            else
              pm="${{ steps.filter.outputs.paxminer }}"
              sb="${{ steps.filter.outputs.slackblast }}"
              qs="${{ steps.filter.outputs.qsignups }}"
              [[ "$pm" == "true" ]] && echo "run_paxminer=true" >> "$GITHUB_OUTPUT" || echo "run_paxminer=false" >> "$GITHUB_OUTPUT"
              [[ "$sb" == "true" ]] && echo "run_slackblast=true" >> "$GITHUB_OUTPUT" || echo "run_slackblast=false" >> "$GITHUB_OUTPUT"
              [[ "$qs" == "true" ]] && echo "run_qsignups=true" >> "$GITHUB_OUTPUT" || echo "run_qsignups=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  setup:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    environment: ${{ github.event.inputs.environment || github.ref_name }}
    outputs:
      sam_s3_bucket: ${{ steps.resolve_bucket.outputs.sam_s3_bucket }}
    steps:
      - uses: actions/checkout@v7

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Must match deploy.sh SAM artifact bucket resolution: only this bootstrap bucket is allowed
      # by SlackStackDeployPolicy (S3DeployBucket). Do not switch to --resolve-s3 here without
      # widening IAM — SAM's default aws-sam-cli-managed-default-samclisourcebucket-* is not covered.
      - name: Resolve deployment bucket
        id: resolve_bucket
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name slack-stack-bootstrap \
            --region "${{ vars.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='DeploymentBucketName'].OutputValue | [0]" \
            --output text)
          if [[ -z "$BUCKET" || "$BUCKET" == "None" ]]; then
            echo "::error::Could not resolve DeploymentBucketName from slack-stack-bootstrap stack"
            exit 1
          fi
          echo "sam_s3_bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "SAM_S3_BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "Using deployment bucket: $BUCKET"

      - name: Validate DB_ENCRYPTION_KEY
        env:
          KEY: ${{ secrets.DB_ENCRYPTION_KEY }}
        run: |
          if [[ -z "$KEY" ]]; then
            echo "::error::DB_ENCRYPTION_KEY secret is not set for this environment"
            exit 1
          fi
          if [[ "${#KEY}" -lt 16 ]]; then
            echo "::error::DB_ENCRYPTION_KEY must be at least 16 characters"
            exit 1
          fi

      - name: Validate Slack OAuth client IDs
        env:
          SB_ID: ${{ vars.SB_SLACK_CLIENT_ID }}
          QS_ID: ${{ vars.QS_SLACK_CLIENT_ID }}
        run: |
          if [[ -z "$SB_ID" ]]; then
            echo "::error::SB_SLACK_CLIENT_ID variable is not set for this environment"
            exit 1
          fi
          if [[ -z "$QS_ID" ]]; then
            echo "::error::QS_SLACK_CLIENT_ID variable is not set for this environment"
            exit 1
          fi

      - name: SAM validate (lint all templates)
        run: |
          set -euo pipefail
          sam validate -t PAXminer/template.yaml --lint
          sam validate -t slackblast/template.yaml --lint
          sam validate -t qsignups/template.yaml --lint
          sam validate -t infra/template.bootstrap.yaml --lint

  deploy-paxminer:
    runs-on: ubuntu-latest
    needs: [detect-changes, setup]
    if: needs.detect-changes.outputs.run_paxminer == 'true'
    environment: ${{ github.event.inputs.environment || github.ref_name }}
    env:
      SAM_S3_BUCKET: ${{ needs.setup.outputs.sam_s3_bucket }}
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build PAXminer
        run: |
          set -euo pipefail
          sam build -t PAXminer/template.yaml --no-cached
      - name: Deploy PAXminer
        run: |
          sam deploy \
            --stack-name paxminer-${{ vars.STAGE }} \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --resolve-image-repos \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DatabaseHost=${{ secrets.DATABASE_HOST }} \
              DatabasePort=${{ secrets.DATABASE_PORT }} \
              DatabaseUser=${{ secrets.DATABASE_USER }} \
              DatabasePassword=${{ secrets.DATABASE_PASSWORD }} \
              DatabaseTlsEnabled=${{ vars.DATABASE_TLS_ENABLED }} \
              DbEncryptionKey=${{ secrets.DB_ENCRYPTION_KEY }} \
              PaxminerSchema=${{ vars.PAXMINER_SCHEMA }}_${{ vars.STAGE }} \
              Stage=${{ vars.STAGE }} \
              F3RegionName=${{ vars.F3_REGION_NAME }} \
              PmSlackToken=${{ secrets.PM_SLACK_TOKEN }} \
              PmSlackSigningSecret=${{ secrets.PM_SLACK_SIGNING_SECRET }} \
              PaxminerSweepSecret=${{ secrets.PAXMINER_SWEEP_SECRET }}

  deploy-slackblast:
    runs-on: ubuntu-latest
    needs: [detect-changes, setup]
    if: needs.detect-changes.outputs.run_slackblast == 'true'
    environment: ${{ github.event.inputs.environment || github.ref_name }}
    env:
      ENABLE_XRAY: ${{ vars.ENABLE_XRAY }}
      SAM_S3_BUCKET: ${{ needs.setup.outputs.sam_s3_bucket }}
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build slackblast
        run: |
          set -euo pipefail
          sam build -t slackblast/template.yaml --use-container --no-cached
      - name: Deploy slackblast
        env:
          SB_STRAVA_CLIENT_ID: ${{ secrets.SB_STRAVA_CLIENT_ID }}
          SB_STRAVA_CLIENT_SECRET: ${{ secrets.SB_STRAVA_CLIENT_SECRET }}
          SB_CREATE_OAUTH_TABLES: ${{ vars.SB_CREATE_OAUTH_TABLES }}
        run: |
          set -euo pipefail
          ACH_URL="$(aws cloudformation describe-stacks --stack-name paxminer-${{ vars.STAGE }} \
            --query "Stacks[0].Outputs[?OutputKey=='AchievementsFunctionUrl'].OutputValue | [0]" --output text 2>/dev/null || true)"
          [[ "$ACH_URL" == "None" ]] && ACH_URL=""
          OVERRIDES=(
            "Stage=${{ vars.STAGE }}"
            "DatabaseHost=${{ secrets.DATABASE_HOST }}"
            "DatabasePort=${{ secrets.DATABASE_PORT }}"
            "DatabaseUser=${{ secrets.DATABASE_USER }}"
            "DatabasePassword=${{ secrets.DATABASE_PASSWORD }}"
            "DatabaseTlsEnabled=${{ vars.DATABASE_TLS_ENABLED }}"
            "DatabaseSchema=${{ vars.SLACKBLAST_SCHEMA }}_${{ vars.STAGE }}"
            "PaxminerSchema=${{ vars.PAXMINER_SCHEMA }}_${{ vars.STAGE }}"
            "PaxminerAchievementsUrl=${ACH_URL}"
            "PaxminerSweepSecret=${{ secrets.PAXMINER_SWEEP_SECRET }}"
            "SlackToken=${{ secrets.SB_SLACK_TOKEN }}"
            "SlackSigningSecret=${{ secrets.SB_SLACK_SIGNING_SECRET }}"
            "SlackClientSecret=${{ secrets.SB_SLACK_CLIENT_SECRET }}"
            "SlackClientId=${{ vars.SB_SLACK_CLIENT_ID }}"
            "DbEncryptionKey=${{ secrets.DB_ENCRYPTION_KEY }}"
            "ImageBucketName=${{ vars.IMAGE_S3_BUCKET }}"
          )
          [[ -n "${SB_STRAVA_CLIENT_ID:-}" ]] && OVERRIDES+=("StravaClientID=${SB_STRAVA_CLIENT_ID}")
          [[ -n "${SB_STRAVA_CLIENT_SECRET:-}" ]] && OVERRIDES+=("StravaClientSecret=${SB_STRAVA_CLIENT_SECRET}")
          [[ -n "${SB_CREATE_OAUTH_TABLES:-}" ]] && OVERRIDES+=("CreateOauthTables=${SB_CREATE_OAUTH_TABLES}")
          if [[ "${ENABLE_XRAY:-false}" == "true" ]]; then OVERRIDES+=("EnableXRay=true"); else OVERRIDES+=("EnableXRay=false"); fi
          sam deploy \
            --stack-name slackblast-${{ vars.STAGE }} \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "${OVERRIDES[@]}"

  deploy-qsignups:
    runs-on: ubuntu-latest
    needs: [detect-changes, setup]
    if: needs.detect-changes.outputs.run_qsignups == 'true'
    environment: ${{ github.event.inputs.environment || github.ref_name }}
    env:
      RUN_EXTEND_SCHEDULE: ${{ vars.RUN_EXTEND_SCHEDULE }}
      ENABLE_XRAY: ${{ vars.ENABLE_XRAY }}
      SAM_S3_BUCKET: ${{ needs.setup.outputs.sam_s3_bucket }}
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build qsignups
        run: |
          set -euo pipefail
          sam build -t qsignups/template.yaml --use-container --no-cached
      - name: Deploy qsignups
        env:
          QS_GOOGLE_CLIENT_ID: ${{ secrets.QS_GOOGLE_CLIENT_ID }}
          QS_GOOGLE_CLIENT_SECRET: ${{ secrets.QS_GOOGLE_CLIENT_SECRET }}
          QS_CREATE_OAUTH_TABLES: ${{ vars.QS_CREATE_OAUTH_TABLES }}
        run: |
          set -euo pipefail
          if [[ "${RUN_EXTEND_SCHEDULE:-false}" == "true" ]]; then
            EXTEND_NONCE="${{ github.sha }}"
          else
            EXTEND_NONCE="no-extend"
          fi
          OVERRIDES=(
            "Stage=${{ vars.STAGE }}"
            "DatabaseHost=${{ secrets.DATABASE_HOST }}"
            "DatabasePort=${{ secrets.DATABASE_PORT }}"
            "DatabaseUser=${{ secrets.DATABASE_USER }}"
            "DatabasePassword=${{ secrets.DATABASE_PASSWORD }}"
            "DatabaseTlsEnabled=${{ vars.DATABASE_TLS_ENABLED }}"
            "DatabaseSchema=${{ vars.QSIGNUPS_SCHEMA }}_${{ vars.STAGE }}"
            "PaxminerRegionalSchema=${{ vars.WEASELBOT_PAXMINER_REGIONAL_SCHEMAS }}"
            "SlackToken=${{ secrets.QS_SLACK_TOKEN }}"
            "SlackSigningSecret=${{ secrets.QS_SLACK_SIGNING_SECRET }}"
            "SlackClientSecret=${{ secrets.QS_SLACK_CLIENT_SECRET }}"
            "SlackClientId=${{ vars.QS_SLACK_CLIENT_ID }}"
            "DbEncryptionKey=${{ secrets.DB_ENCRYPTION_KEY }}"
            "ExtendScheduleDeployNonce=${EXTEND_NONCE}"
            "ImageBucketName=${{ vars.IMAGE_S3_BUCKET }}"
          )
          [[ -n "${QS_GOOGLE_CLIENT_ID:-}" ]] && OVERRIDES+=("GoogleClientId=${QS_GOOGLE_CLIENT_ID}")
          [[ -n "${QS_GOOGLE_CLIENT_SECRET:-}" ]] && OVERRIDES+=("GoogleClientSecret=${QS_GOOGLE_CLIENT_SECRET}")
          [[ -n "${QS_CREATE_OAUTH_TABLES:-}" ]] && OVERRIDES+=("CreateOauthTables=${QS_CREATE_OAUTH_TABLES}")
          if [[ "${ENABLE_XRAY:-false}" == "true" ]]; then OVERRIDES+=("EnableXRay=true"); else OVERRIDES+=("EnableXRay=false"); fi
          sam deploy \
            --stack-name qsignups-${{ vars.STAGE }} \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "${OVERRIDES[@]}"

  post-deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, setup, deploy-paxminer, deploy-slackblast, deploy-qsignups]
    if: >-
      always() && !cancelled() &&
      needs.setup.result == 'success' &&
      needs.deploy-paxminer.result != 'failure' &&
      needs.deploy-slackblast.result != 'failure' &&
      needs.deploy-qsignups.result != 'failure'
    environment: ${{ github.event.inputs.environment || github.ref_name }}
    steps:
      - uses: actions/checkout@v7

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Smoke-test scheduled Lambdas
        env:
          STAGE: ${{ vars.STAGE }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          RUN_PM: ${{ needs.detect-changes.outputs.run_paxminer }}
        run: |
          set -euo pipefail
          invoke_one() {
            local fn="$1"
            echo "--- Invoking ${fn} ---"
            aws lambda invoke \
              --function-name "$fn" \
              --invocation-type RequestResponse \
              --cli-binary-format raw-in-base64-out \
              --payload '{}' \
              --log-type Tail \
              /tmp/lambda-payload.json > /tmp/lambda-meta.json
            if jq -e '.LogResult' /tmp/lambda-meta.json >/dev/null 2>&1; then
              echo "--- CloudWatch tail (last invocation) ---"
              jq -r '.LogResult' /tmp/lambda-meta.json | base64 -d 2>/dev/null || true
              echo ""
            fi
            echo "--- Handler response ---"
            cat /tmp/lambda-payload.json
            echo ""
            local sc
            sc=$(jq -r '.statusCode // empty' /tmp/lambda-payload.json 2>/dev/null || echo "")
            if [[ -z "$sc" || "$sc" == "null" ]]; then
              echo "::error::Lambda ${fn}: response missing statusCode"
              exit 1
            fi
            if [[ "$sc" != "200" ]]; then
              echo "::error::Lambda ${fn} returned statusCode=${sc}"
              exit 1
            fi
          }
          if [[ "${RUN_PM}" == "true" ]]; then
            invoke_one "paxminer-${STAGE}-paxminer-sync"
            invoke_one "paxminer-${STAGE}-paxminer-achievements"
            aws lambda invoke --function-name "paxminer-${STAGE}-paxminer-kotter" \
              --invocation-type RequestResponse --cli-binary-format raw-in-base64-out \
              --payload '{"source":"smoke"}' /tmp/lambda-payload.json
            aws lambda invoke --function-name "paxminer-${STAGE}-paxminer-achievements" \
              --invocation-type RequestResponse --cli-binary-format raw-in-base64-out \
              --payload '{"source":"smoke","feature":"achievement_leaderboard"}' /tmp/lambda-payload.json
          else
            echo "Skipping PAXminer smoke test (stack not deployed this run)"
          fi

      - name: Deploy summary, receipt, and stage Slack manifests
        env:
          STAGE: ${{ vars.STAGE }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          mkdir -p receipts
          RECEIPT="receipts/deploy-ci-${STAGE}-$(date -u +%Y%m%d%H%M%S).txt"
          {
            echo "=== Deploy receipt (CI) ==="
            echo "Started (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Stage: ${STAGE}"
            echo "AWS region: ${AWS_DEFAULT_REGION}"
            echo ""
            echo "--- Stack outputs ---"
            for s in paxminer slackblast qsignups; do
              name="${s}-${STAGE}"
              echo "# ${name}"
              aws cloudformation describe-stacks --stack-name "$name" \
                --query 'Stacks[0].Outputs[].[OutputKey,OutputValue]' --output text 2>/dev/null || echo "(describe-stacks failed for ${name})"
              echo ""
            done
          } | tee "$RECEIPT"

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            {
              echo "## Deploy outputs (${STAGE})"
              echo ""
              echo '```'
              cat "$RECEIPT"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          ROOT="${GITHUB_WORKSPACE}"
          cd "$ROOT"
          get_out() {
            aws cloudformation describe-stacks --stack-name "$1" --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue | [0]" --output text 2>/dev/null || true
          }
          api_base() {
            local url="$1"
            [[ -z "$url" || "$url" == "None" ]] && { echo ""; return; }
            url="${url%%/slack/events*}"
            while [[ "$url" == */ ]]; do url="${url%/}"; done
            echo "$url"
          }
          write_subst() {
            local app="$1" base="$2"
            python3 -c "import pathlib,sys; s=pathlib.Path(sys.argv[1]); d=pathlib.Path(sys.argv[2]); b=sys.argv[3]; d.write_text(s.read_text(encoding='utf-8').replace('__HOSTNAME__', b), encoding='utf-8')" \
              "$ROOT/$app/manifest.json" "$ROOT/$app/manifest-${STAGE}.json" "$base"
            echo "Wrote $app/manifest-${STAGE}.json"
          }
          PM_KOTTER="$(get_out "paxminer-${STAGE}" KotterFunctionUrl)"
          if [[ -n "$PM_KOTTER" && "$PM_KOTTER" != "None" ]]; then
            write_subst PAXminer "$PM_KOTTER"
          else
            cp "$ROOT/PAXminer/manifest.json" "$ROOT/PAXminer/manifest-${STAGE}.json"
            echo "WARN: KotterFunctionUrl missing; copied PAXminer manifest"
          fi
          SB_FULL="$(get_out "slackblast-${STAGE}" SlackblastApi)"
          SB_BASE="$(api_base "$SB_FULL")"
          if [[ -n "$SB_BASE" ]]; then
            write_subst slackblast "$SB_BASE"
          else
            echo "WARN: SlackblastApi missing; skip slackblast manifest"
          fi
          QS_FULL="$(get_out "qsignups-${STAGE}" QSignupsApi)"
          QS_BASE="$(api_base "$QS_FULL")"
          if [[ -n "$QS_BASE" ]]; then
            write_subst qsignups "$QS_BASE"
          else
            echo "WARN: QSignupsApi missing; skip qsignups manifest"
          fi
          for app in slackblast qsignups; do
            [[ -f "$ROOT/$app/manifest-${STAGE}.json" ]] && continue
            cp "$ROOT/$app/manifest.json" "$ROOT/$app/manifest-${STAGE}.json" 2>/dev/null || true
          done
          echo "Receipt: ${RECEIPT}"

      - name: Upload deploy receipt and manifests
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: deploy-receipt-manifests-${{ vars.STAGE }}-${{ github.run_id }}
          path: |
            receipts/
            PAXminer/manifest-${{ vars.STAGE }}.json
            slackblast/manifest-${{ vars.STAGE }}.json
            qsignups/manifest-${{ vars.STAGE }}.json
          if-no-files-found: warn
