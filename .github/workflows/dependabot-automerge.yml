name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      # App token (not GITHUB_TOKEN) so the eventual merge triggers downstream
      # workflows (promote-main-to-prod / deploy). Requires the app id + key to be
      # present as Dependabot secrets (this workflow runs on Dependabot events).
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - uses: dependabot/fetch-metadata@v3
        id: meta
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Route major updates to test
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh label create dependency-major --color "B60205" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --base test --add-label dependency-major
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"

      - name: Auto-merge patch and minor updates to main
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
