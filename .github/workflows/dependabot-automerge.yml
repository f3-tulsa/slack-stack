name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      # App token (not GITHUB_TOKEN) so the eventual merge triggers downstream
      # workflows (promote-main-to-prod / deploy). Requires the app id + key to be
      # present as Dependabot secrets (this workflow runs on Dependabot events).
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      # Checkout so `gh pr edit --base` (retargeting majors to test) has a git
      # repo + remote to operate against; without it gh errors "not a git repository".
      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: dependabot/fetch-metadata@v2
        id: meta
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Fast-track to main only when the update is minor/patch; route majors and
      # anything we can't confidently classify to test for deploy validation first.
      #
      # fetch-metadata reports a clean update-type for ==-pinned deps and lockfile
      # apps, and dependency-group for grouped PRs. But for ">=" range requirements
      # (used by the pip apps without lockfiles) it returns update-type: null and
      # empty previous/new-version - so for those we parse the ">=" floor versions
      # out of the Dependabot PR title and compute the semver level ourselves.
      # Unparseable / floor-equal / downgrade cases fall through to test (safe).
      - name: Decide route
        id: route
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          DEP_GROUP: ${{ steps.meta.outputs.dependency-group }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -uo pipefail

          # Extract the ">=" floor version (fallback: first version token), then
          # keep only the leading numeric dotted parts (drops .post1/rc/etc.).
          floor() {
            local c="$1" v
            v=$(grep -oE '>=[0-9][0-9.]*' <<< "$c" | head -1 | sed 's/>=//')
            [ -z "$v" ] && v=$(grep -oE '[0-9]+(\.[0-9]+)+' <<< "$c" | head -1)
            grep -oE '^[0-9]+(\.[0-9]+)*' <<< "$v"
          }

          # Classify from a title like:
          #   "Update boto3 requirement from >=1.42.93 to >=1.43.44 in /dir"
          #   "Update slack-sdk requirement from <4,>=3.27.0 to >=3.43.0,<4 in /dir"
          classify_from_title() {
            local title="$1" old_c new_c old_v new_v oM om op nM nm np
            old_c=$(sed -E 's/.* from (.+) to (.+) in .*/\1/' <<< "$title")
            new_c=$(sed -E 's/.* from (.+) to (.+) in .*/\2/' <<< "$title")
            old_v=$(floor "$old_c"); new_v=$(floor "$new_c")
            if [ -z "$old_v" ] || [ -z "$new_v" ]; then echo unknown; return 0; fi
            IFS=. read -r oM om op _ <<< "$old_v"
            IFS=. read -r nM nm np _ <<< "$new_v"
            oM=${oM:-0}; om=${om:-0}; op=${op:-0}
            nM=${nM:-0}; nm=${nm:-0}; np=${np:-0}
            if   [ "$nM" -gt "$oM" ]; then echo major
            elif [ "$nM" -eq "$oM" ] && [ "$nm" -gt "$om" ]; then echo minor
            elif [ "$nM" -eq "$oM" ] && [ "$nm" -eq "$om" ] && [ "$np" -gt "$op" ]; then echo patch
            else echo unknown
            fi
          }

          target=test
          if [[ "$UPDATE_TYPE" == "version-update:semver-minor" \
             || "$UPDATE_TYPE" == "version-update:semver-patch" \
             || "$DEP_GROUP" == "minor-patch" ]]; then
            target=main
          elif [[ "$UPDATE_TYPE" == "version-update:semver-major" ]]; then
            target=test
          else
            level=$(classify_from_title "$PR_TITLE")
            [[ "$level" == "minor" || "$level" == "patch" ]] && target=main || target=test
            echo "Inferred level from title: '${level}'"
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "Routing to $target (update-type='${UPDATE_TYPE}', group='${DEP_GROUP}', title='${PR_TITLE}')"

      - name: Route major/unvalidated updates to test
        if: steps.route.outputs.target == 'test'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh label create dependency-major --color "B60205" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --base test --add-label dependency-major
          gh pr merge --auto --squash "$PR_URL"

      - name: Auto-merge minor/patch updates to main
        if: steps.route.outputs.target == 'main'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "$PR_URL"
