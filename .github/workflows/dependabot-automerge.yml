name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      # App token (not GITHUB_TOKEN) so the eventual merge triggers downstream
      # workflows (promote-main-to-prod / deploy). Requires the app id + key to be
      # present as Dependabot secrets (this workflow runs on Dependabot events).
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - uses: dependabot/fetch-metadata@v2
        id: meta
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Only fast-track to main when we are CONFIDENT the update is minor/patch:
      # either fetch-metadata says so, or it belongs to the minor-patch group.
      # Everything else (semver-major, or ambiguous update-type: null that
      # Dependabot reports for ">=" range requirements) routes to test for
      # deploy validation first. Defaulting ambiguous updates to test is the
      # safe choice - it never lets an unvalidated major reach prod.
      - name: Decide route
        id: route
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          DEP_GROUP: ${{ steps.meta.outputs.dependency-group }}
        run: |
          set -euo pipefail
          if [[ "$UPDATE_TYPE" == "version-update:semver-minor" \
             || "$UPDATE_TYPE" == "version-update:semver-patch" \
             || "$DEP_GROUP" == "minor-patch" ]]; then
            echo "target=main" >> "$GITHUB_OUTPUT"
          else
            echo "target=test" >> "$GITHUB_OUTPUT"
          fi
          echo "Routing to: $(grep target "$GITHUB_OUTPUT") (update-type='${UPDATE_TYPE}', group='${DEP_GROUP}')"

      - name: Route major/unvalidated updates to test
        if: steps.route.outputs.target == 'test'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh label create dependency-major --color "B60205" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --base test --add-label dependency-major
          gh pr merge --auto --squash "$PR_URL"

      - name: Auto-merge minor/patch updates to main
        if: steps.route.outputs.target == 'main'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "$PR_URL"
