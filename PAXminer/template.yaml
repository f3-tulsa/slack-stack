AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: PAXminer — Slack user/channel sync (daily) and monthly charts (container-image Lambdas).

Globals:
  Function:
    Architectures:
      - x86_64

Parameters:
  DatabaseHost:
    Type: String
  DatabasePort:
    Type: String
    Default: "4000"
  DatabaseUser:
    Type: String
  DatabasePassword:
    Type: String
    NoEcho: true
  DatabaseTlsEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  PaxminerSchema:
    Type: String
    Default: paxminer
  PaxminerRegistryDatabase:
    Type: String
    Default: ""
    Description: Optional pymysql database name for registry connection; leave empty to use PaxminerSchema
  DatabaseFullRun:
    Type: String
    Default: "false"
    Description: If true, Slack user sync uses extended lookback (first-time style)
  ChartRegionRegex:
    Type: String
    Default: ""
    Description: Optional character class for PAX charts only (e.g. A-M); empty = all regions with send_pax_charts
  DbEncryptionKey:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: Required passphrase for DB field encryption (slack_token); maps to DB_ENCRYPTION_KEY. Min 16 chars.
  ChartSchedule:
    Type: String
    Default: cron(0 12 1 * ? *)
    Description: When monthly charts run (EventBridge schedule)
  LookbackDays:
    Type: String
    Default: "7"
  BackblastMaxAgeDays:
    Type: String
    Default: "30"
  BackblastMaxFutureDays:
    Type: String
    Default: "2"
  QErrorDmHour:
    Type: String
    Default: "15"
  ChartPeriodOffsetDays:
    Type: String
    Default: "7"
    Description: Days offset for chart month labeling
  Stage:
    Type: String
    AllowedValues:
      - test
      - prod
    Description: Deploy stage (suffix for regional schema names, e.g. f3ttown_test)
  F3RegionName:
    Type: String
    Description: F3 region key in paxminer.regions (e.g. f3ttown)
  PmSlackToken:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: PAXminer Slack bot token for this region (encrypted into DB at cold start)

Resources:
  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-paxminer-sync"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.sync_handler
      MemorySize: 512
      Timeout: 300
      Events:
        DailySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          PAXMINER_REGISTRY_DATABASE: !Ref PaxminerRegistryDatabase
          DATABASE_FULL_RUN: !Ref DatabaseFullRun
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          LOOKBACK_DAYS: !Ref LookbackDays
          BACKBLAST_MAX_AGE_DAYS: !Ref BackblastMaxAgeDays
          BACKBLAST_MAX_FUTURE_DAYS: !Ref BackblastMaxFutureDays
          Q_ERROR_DM_HOUR: !Ref QErrorDmHour
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          PM_SLACK_TOKEN: !Ref PmSlackToken
    Metadata:
      DockerTag: paxminer-sync
      DockerContext: ..
      Dockerfile: PAXminer/Dockerfile

  PaxminerSyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-paxminer-sync"
      RetentionInDays: 30

  ChartFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-paxminer-charts"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.chart_handler
      MemorySize: 1024
      Timeout: 900
      Events:
        MonthlyCharts:
          Type: Schedule
          Properties:
            Schedule: !Ref ChartSchedule
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          PAXMINER_REGISTRY_DATABASE: !Ref PaxminerRegistryDatabase
          CHART_PLOT_DIR: /tmp/paxminer_plots
          CHART_REGION_REGEX: !Ref ChartRegionRegex
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          CHART_PERIOD_OFFSET_DAYS: !Ref ChartPeriodOffsetDays
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          PM_SLACK_TOKEN: !Ref PmSlackToken
    Metadata:
      DockerTag: paxminer-charts
      DockerContext: ..
      Dockerfile: PAXminer/Dockerfile

  PaxminerChartsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-paxminer-charts"
      RetentionInDays: 30

Outputs:
  SyncFunctionArn:
    Value: !GetAtt SyncFunction.Arn
  ChartFunctionArn:
    Value: !GetAtt ChartFunction.Arn
