AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: PAXminer — sync, charts, achievements, Kotter, schedule dispatcher, Slack Bolt front door (container-image Lambdas).

Globals:
  Function:
    Architectures:
      - x86_64

Parameters:
  DatabaseHost:
    Type: String
  DatabasePort:
    Type: String
    Default: "4000"
  DatabaseUser:
    Type: String
  DatabasePassword:
    Type: String
    NoEcho: true
  DatabaseTlsEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  PaxminerSchema:
    Type: String
    Default: paxminer
  PaxminerRegistryDatabase:
    Type: String
    Default: ""
  DatabaseFullRun:
    Type: String
    Default: "false"
  ChartRegionRegex:
    Type: String
    Default: ""
  DbEncryptionKey:
    Type: String
    NoEcho: true
    MinLength: 16
  ChartSchedule:
    Type: String
    Default: cron(0 12 1 * ? *)
  AchievementsSchedule:
    Type: String
    Default: rate(1 day)
  KotterSchedule:
    Type: String
    Default: cron(0 12 1 * ? *)
  ScheduleTick:
    Type: String
    Default: rate(15 minutes)
  PmUseScheduleDispatcher:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  HomeRegionDateTiers:
    Type: String
    Default: "30,60,90,120"
  PmAchievementsWebhookSecret:
    Type: String
    NoEcho: true
    MinLength: 16
  LookbackDays:
    Type: String
    Default: "7"
  BackblastMaxAgeDays:
    Type: String
    Default: "30"
  BackblastMaxFutureDays:
    Type: String
    Default: "2"
  QErrorDmHour:
    Type: String
    Default: "15"
  ChartPeriodOffsetDays:
    Type: String
    Default: "7"
  Stage:
    Type: String
    AllowedValues:
      - test
      - prod
  F3RegionName:
    Type: String
  PmSlackToken:
    Type: String
    NoEcho: true
    MinLength: 16
  PmSlackSigningSecret:
    Type: String
    NoEcho: true
    MinLength: 16

Resources:
  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-paxminer-sync"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.sync_handler
      MemorySize: 512
      Timeout: 300
      Events:
        DailySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          PAXMINER_REGISTRY_DATABASE: !Ref PaxminerRegistryDatabase
          DATABASE_FULL_RUN: !Ref DatabaseFullRun
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          LOOKBACK_DAYS: !Ref LookbackDays
          BACKBLAST_MAX_AGE_DAYS: !Ref BackblastMaxAgeDays
          BACKBLAST_MAX_FUTURE_DAYS: !Ref BackblastMaxFutureDays
          Q_ERROR_DM_HOUR: !Ref QErrorDmHour
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          PM_SLACK_TOKEN: !Ref PmSlackToken
    Metadata:
      DockerTag: paxminer-sync
      DockerContext: ..
      Dockerfile: PAXminer/Dockerfile

  PaxminerSyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-paxminer-sync"
      RetentionInDays: 30

  ChartFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-paxminer-charts"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.chart_handler
      MemorySize: 1024
      Timeout: 900
      Events:
        MonthlyCharts:
          Type: Schedule
          Properties:
            Schedule: !Ref ChartSchedule
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          PAXMINER_REGISTRY_DATABASE: !Ref PaxminerRegistryDatabase
          CHART_PLOT_DIR: /tmp/paxminer_plots
          CHART_REGION_REGEX: !Ref ChartRegionRegex
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          CHART_PERIOD_OFFSET_DAYS: !Ref ChartPeriodOffsetDays
          PM_USE_SCHEDULE_DISPATCHER: !Ref PmUseScheduleDispatcher
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          PM_SLACK_TOKEN: !Ref PmSlackToken
    Metadata:
      DockerTag: paxminer-charts
      DockerContext: ..
      Dockerfile: PAXminer/Dockerfile

  PaxminerChartsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-paxminer-charts"
      RetentionInDays: 30

  AchievementsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-paxminer-achievements"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.achievements_handler
      MemorySize: 512
      Timeout: 300
      FunctionUrlConfig:
        AuthType: NONE
      Events:
        DailyAchievements:
          Type: Schedule
          Properties:
            Schedule: !Ref AchievementsSchedule
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          PAXMINER_REGISTRY_DATABASE: !Ref PaxminerRegistryDatabase
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          HOME_REGION_DATE_TIERS: !Ref HomeRegionDateTiers
          PM_ACHIEVEMENTS_WEBHOOK_SECRET: !Ref PmAchievementsWebhookSecret
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          PM_SLACK_TOKEN: !Ref PmSlackToken
    Metadata:
      DockerTag: paxminer-achievements
      DockerContext: ..
      Dockerfile: PAXminer/Dockerfile

  PaxminerAchievementsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-paxminer-achievements"
      RetentionInDays: 30

  KotterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-paxminer-kotter"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.kotter_handler
      MemorySize: 512
      Timeout: 900
      Events:
        MonthlyKotter:
          Type: Schedule
          Properties:
            Schedule: !Ref KotterSchedule
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          PAXMINER_REGISTRY_DATABASE: !Ref PaxminerRegistryDatabase
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          HOME_REGION_DATE_TIERS: !Ref HomeRegionDateTiers
          PM_USE_SCHEDULE_DISPATCHER: !Ref PmUseScheduleDispatcher
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          PM_SLACK_TOKEN: !Ref PmSlackToken
    Metadata:
      DockerTag: paxminer-kotter
      DockerContext: ..
      Dockerfile: PAXminer/Dockerfile

  PaxminerKotterLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-paxminer-kotter"
      RetentionInDays: 30

  ScheduleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-paxminer-schedule"
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.schedule_handler
      MemorySize: 1024
      Timeout: 900
      Policies:
        - Statement:
            - Sid: SelfInvokeSchedule
              Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-paxminer-schedule"
      Events:
        ScheduleTick:
          Type: Schedule
          Properties:
            Schedule: !Ref ScheduleTick
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          PAXMINER_REGISTRY_DATABASE: !Ref PaxminerRegistryDatabase
          CHART_PLOT_DIR: /tmp/paxminer_plots
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          CHART_PERIOD_OFFSET_DAYS: !Ref ChartPeriodOffsetDays
          HOME_REGION_DATE_TIERS: !Ref HomeRegionDateTiers
          PM_USE_SCHEDULE_DISPATCHER: !Ref PmUseScheduleDispatcher
          SCHEDULE_FUNCTION_NAME: !Sub "${AWS::StackName}-paxminer-schedule"
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          PM_SLACK_TOKEN: !Ref PmSlackToken
    Metadata:
      DockerTag: paxminer-schedule
      DockerContext: ..
      Dockerfile: PAXminer/Dockerfile

  PaxminerScheduleLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-paxminer-schedule"
      RetentionInDays: 30

  SlackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-paxminer-slack"
      PackageType: Image
      ImageConfig:
        Command:
          - slack_app.handler
      MemorySize: 512
      Timeout: 30
      FunctionUrlConfig:
        AuthType: NONE
      Policies:
        - Statement:
            - Sid: InvokeSchedule
              Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt ScheduleFunction.Arn
      Events:
        Warmup:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
      Environment:
        Variables:
          DATABASE_HOST: !Ref DatabaseHost
          DATABASE_PORT: !Ref DatabasePort
          DATABASE_USER: !Ref DatabaseUser
          DATABASE_PASSWORD: !Ref DatabasePassword
          DATABASE_TLS_ENABLED: !Ref DatabaseTlsEnabled
          PAXMINER_SCHEMA: !Ref PaxminerSchema
          PAXMINER_REGISTRY_DATABASE: !Ref PaxminerRegistryDatabase
          DB_ENCRYPTION_KEY: !Ref DbEncryptionKey
          STAGE: !Ref Stage
          F3_REGION_NAME: !Ref F3RegionName
          PM_SLACK_TOKEN: !Ref PmSlackToken
          PM_SLACK_SIGNING_SECRET: !Ref PmSlackSigningSecret
          SCHEDULE_FUNCTION_NAME: !Ref ScheduleFunction
          SLACKBLAST_SCHEMA: !Sub "slackblast_${Stage}"
    Metadata:
      DockerTag: paxminer-slack
      DockerContext: ..
      Dockerfile: PAXminer/Dockerfile.slack

  PaxminerSlackLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-paxminer-slack"
      RetentionInDays: 30

Outputs:
  SyncFunctionArn:
    Value: !GetAtt SyncFunction.Arn
  ChartFunctionArn:
    Value: !GetAtt ChartFunction.Arn
  AchievementsFunctionArn:
    Value: !GetAtt AchievementsFunction.Arn
  AchievementsFunctionUrl:
    Value: !GetAtt AchievementsFunctionUrl.FunctionUrl
  KotterFunctionArn:
    Value: !GetAtt KotterFunction.Arn
  ScheduleFunctionArn:
    Value: !GetAtt ScheduleFunction.Arn
  SlackFunctionArn:
    Value: !GetAtt SlackFunction.Arn
  SlackFunctionUrl:
    Value: !GetAtt SlackFunctionUrl.FunctionUrl
